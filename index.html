<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة صوتية</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eef2f3; padding-top: 50px; }
        .box { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; margin: 10px; color: white; }
        #join { background: #28a745; } #leave { background: #dc3545; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎤 تطبيق دردشة صوتية</h2>
        <button id="join" onclick="joinCall()">دخول المكالمة</button>
        <button id="leave" onclick="leaveCall()">خروج</button>
        <p id="status">الحالة: غير متصل</p>
    </div>
    <script>
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudio;
        const appId = "A6d9eb4d40114314bda5d526227acd5a";
        async function joinCall() {
            await client.join(appId, "chat_room", null);
            localAudio = await AgoraRTC.createMicrophoneAudioTrack();
            await client.publish([localAudio]);
            document.getElementById('status').innerText = "متصل الآن ✅";
        }
        async function leaveCall() {
            if(localAudio) localAudio.close();
            await client.leave();
            document.getElementById('status').innerText = "تم الفصل";
        }
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") user.audioTrack.play();
        });
    </script>
</body>
</html>
